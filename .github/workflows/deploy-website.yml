name: Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_PATH: /barberoos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webiste/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: webiste

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static website
        run: npm run build
        working-directory: webiste

      - name: Disable Jekyll
        run: touch out/.nojekyll
        working-directory: webiste

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webiste/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
